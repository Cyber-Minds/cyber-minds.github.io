<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Terminal</title>
    <meta http-equiv="refresh" content="0; url=./frontend/" />
    <script>
      const nextPath = `./frontend/${window.location.search || ''}${window.location.hash || ''}`;
      window.location.replace(nextPath);
    </script>
  </head>
  <body>
    <p>
      Redirecting to terminal...
      <a href="./frontend/">Continue manually</a>
    </p>
  </body>
</html>

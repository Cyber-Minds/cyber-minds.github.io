services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3000
    restart: unless-stopped
    depends_on:
      - terminal-base

  terminal-base:
    build:
      context: .
      dockerfile: Dockerfile.terminal
    image: terminal-base:latest
    command: "true"

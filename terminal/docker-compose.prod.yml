services:
  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - backend
    ports:
      - '${CADDY_HTTP_PORT:-80}:80'
      - '${CADDY_HTTPS_PORT:-443}:443'
      - '${CADDY_HTTPS_PORT:-443}:443/udp'
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-terminal.egeuysal.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3000
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    restart: unless-stopped
    depends_on:
      - terminal-base
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  terminal-base:
    build:
      context: .
      dockerfile: Dockerfile.terminal
    image: terminal-base:latest
    command: 'true'

volumes:
  caddy_data:
  caddy_config:

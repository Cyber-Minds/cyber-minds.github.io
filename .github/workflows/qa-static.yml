# Runs the static HTML QA script on every push and pull request.
# Only touches frontend files — no Go build or backend required.

name: QA Static HTML

on:
  push:
    paths:
      - '**.html'
      - 'CSS/**'
      - 'Javascript/**'
      - 'Images/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/qa-static.yml'
  pull_request:
    paths:
      - '**.html'
      - 'CSS/**'
      - 'Javascript/**'
      - 'Images/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/qa-static.yml'

jobs:
  qa-static:
    name: Static HTML QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test QA script
        run: npm run test:qa

      - name: Check changed HTML
        env:
          QA_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: npm run qa:static -- --changed-from "$QA_BASE"

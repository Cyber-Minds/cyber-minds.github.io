name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Go backend build + smoke check
  # ─────────────────────────────────────────────
  backend:
    name: Backend Build & Smoke Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Verify build compiles
        run: go build ./...

      - name: Run go vet (smoke check)
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following Go files are not formatted:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 2 — Frontend lint checks
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for syntax errors in JS files
        run: |
          echo "Checking JavaScript files for syntax errors..."
          find Javascript -name "*.js" | while read f; do
            node --check "$f" && echo "OK: $f" || { echo "SYNTAX ERROR: $f"; exit 1; }
          done

      - name: Check HTML files exist and are non-empty
        run: |
          echo "Checking HTML files..."
          find HTML -name "*.html" | while read f; do
            if [ ! -s "$f" ]; then
              echo "EMPTY FILE: $f"
              exit 1
            fi
            echo "OK: $f"
          done
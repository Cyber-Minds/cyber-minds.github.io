name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build and Smoke Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Verify build compiles
        run: go build ./...
      - name: Run go vet
        run: go vet ./...
      - name: Check formatting
        run: |
          unformatted=\terminal\backend\constants.go terminal\backend\doc.go terminal\backend\environment.go terminal\backend\files.go terminal\backend\main.go terminal\backend\middleware.go terminal\backend\progress.go terminal\backend\session.go terminal\backend\terminal_handler.go
          if [ -n "\" ]; then
            echo "Unformatted files: \"
            exit 1
          fi

  frontend:
    name: Frontend Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JS syntax
        run: |
          find Javascript -name "*.js" | while read f; do
            node --check "\" && echo "OK: \" || { echo "SYNTAX ERROR: \"; exit 1; }
          done
      - name: Check HTML files are non-empty
        run: |
          find HTML -name "*.html" | while read f; do
            if [ ! -s "\" ]; then echo "EMPTY: \"; exit 1; fi
            echo "OK: \"
          done

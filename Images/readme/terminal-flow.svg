<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'Trebuchet MS', sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap');
    </style>

    <radialGradient id="bg" cx="50%" cy="6%" r="115%">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="55%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#0b1122"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1b2942" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <marker id="aCyan" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#22d3ee"/></marker>
    <marker id="aViolet" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#a78bfa"/></marker>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#fbbf24"/></marker>
    <marker id="aAmberStart" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M9 0 L0 4.5 L9 9 Z" fill="#fbbf24"/></marker>
  </defs>

  <rect width="900" height="405" fill="url(#bg)"/>
  <rect width="900" height="405" fill="url(#grid)" opacity="0.35"/>

  <text x="450" y="50" text-anchor="middle" fill="#dce8f5" font-size="26" font-weight="700" letter-spacing="1.2">Terminal session flow</text>

  <!-- Isolation boundary -->
  <rect x="610" y="96" width="250" height="215" rx="14" fill="#1a0f14" fill-opacity="0.4" stroke="#fb7185" stroke-width="1.4" stroke-dasharray="7 5"/>
  <rect x="628" y="108" width="120" height="22" rx="11" fill="#241017"/>
  <text x="688" y="123" text-anchor="middle" fill="#fda4af" font-size="11" font-weight="700" letter-spacing="1.5">ISOLATED</text>

  <!-- Browser terminal (cyan) -->
  <rect x="50" y="136" width="210" height="120" rx="14" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="50" y="136" width="210" height="120" rx="14" fill="none" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow)"/>
  <g transform="translate(155,174)" stroke="#67e8f9" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-15" y="-12" width="30" height="24" rx="4"/>
    <path d="M-8 -3 l4 3 l-4 3"/><line x1="1" y1="5" x2="8" y2="5"/>
  </g>
  <text x="155" y="222" text-anchor="middle" fill="#e6ecf5" font-size="16" font-weight="700">Browser terminal</text>
  <text x="155" y="243" text-anchor="middle" fill="#8497b0" font-size="11.5">xterm.js session</text>

  <!-- Go backend (violet) -->
  <rect x="345" y="136" width="210" height="120" rx="14" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="345" y="136" width="210" height="120" rx="14" fill="none" stroke="#a78bfa" stroke-width="1.6" filter="url(#glow)"/>
  <g transform="translate(450,174)" stroke="#c4b5fd" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-15" y="-13" width="30" height="11" rx="3"/><rect x="-15" y="2" width="30" height="11" rx="3"/>
    <circle cx="-9" cy="-7.5" r="1.4" fill="#c4b5fd"/><circle cx="-9" cy="7.5" r="1.4" fill="#c4b5fd"/>
  </g>
  <text x="450" y="222" text-anchor="middle" fill="#e6ecf5" font-size="16" font-weight="700">Go backend</text>
  <text x="450" y="243" text-anchor="middle" fill="#8497b0" font-size="11.5">session API</text>

  <!-- Container stack (amber) -->
  <rect x="672" y="120" width="168" height="118" rx="13" fill="#141019" opacity="0.32" stroke="#fbbf24" stroke-width="1.3"/>
  <rect x="661" y="130" width="168" height="118" rx="13" fill="#15111c" opacity="0.55" stroke="#fbbf24" stroke-width="1.3"/>
  <rect x="650" y="140" width="168" height="118" rx="13" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="650" y="140" width="168" height="118" rx="13" fill="none" stroke="#fbbf24" stroke-width="1.6" filter="url(#glow)"/>
  <g transform="translate(734,177)" stroke="#fcd34d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-14 2 L0 -9 L14 2 L0 13 Z"/><path d="M-14 2 L0 13 L0 -9"/>
  </g>
  <text x="734" y="224" text-anchor="middle" fill="#e6ecf5" font-size="16" font-weight="700">Docker container</text>
  <text x="734" y="244" text-anchor="middle" fill="#8497b0" font-size="11.5">one per session</text>

  <!-- Step 1: browser -> backend -->
  <line x1="262" y1="196" x2="341" y2="196" stroke="#22d3ee" stroke-width="1.7" marker-end="url(#aCyan)"/>
  <text x="302" y="182" text-anchor="middle" fill="#7fb9c9" font-size="11">connect</text>
  <text x="302" y="169" text-anchor="middle" fill="#5f7d8a" font-size="9.5">WebSocket</text>

  <!-- Step 2: backend -> container -->
  <line x1="557" y1="196" x2="646" y2="196" stroke="#a78bfa" stroke-width="1.7" marker-end="url(#aViolet)"/>
  <text x="601" y="182" text-anchor="middle" fill="#b3a0e0" font-size="11">spawn</text>
  <text x="601" y="169" text-anchor="middle" fill="#8877b8" font-size="9.5">new container</text>

  <!-- Step 3: bidirectional stream along the bottom -->
  <path d="M734 258 L734 345 L155 345 L155 258" fill="none" stroke="#fbbf24" stroke-width="1.7" opacity="0.9" marker-end="url(#aAmber)" marker-start="url(#aAmberStart)"/>
  <circle cx="734" cy="345" r="3" fill="#fbbf24"/><circle cx="155" cy="345" r="3" fill="#fbbf24"/>
  <rect x="380" y="332" width="140" height="24" rx="12" fill="#05080f"/>
  <text x="450" y="348" text-anchor="middle" fill="#e0b45a" font-size="11.5">stream stdin and stdout</text>
</svg>

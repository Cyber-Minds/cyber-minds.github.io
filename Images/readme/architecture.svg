<svg width="720" height="490" viewBox="0 72 720 490" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'Trebuchet MS', sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap');
    </style>

    <radialGradient id="bg" cx="50%" cy="12%" r="105%">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="55%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>

    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#0b1122"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1b2942" stroke-width="0.5"/>
    </pattern>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <marker id="arrowCyan" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="720" height="562" fill="url(#bg)"/>
  <rect width="720" height="562" fill="url(#grid)" opacity="0.35"/>

  <!-- ============ FRONTEND ZONE ============ -->
  <rect x="40" y="96" width="640" height="205" rx="12" fill="#0c1424" fill-opacity="0.35" stroke="#3a4c66" stroke-width="1.4" stroke-dasharray="7 5"/>
  <rect x="60" y="108" width="98" height="22" rx="11" fill="#16223a"/>
  <text x="109" y="123" text-anchor="middle" fill="#9db0c9" font-size="12" font-weight="700" letter-spacing="2">FRONTEND</text>

  <!-- Course viewer (violet) -->
  <rect x="62" y="146" width="180" height="123" rx="12" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="62" y="146" width="180" height="123" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.6" filter="url(#glow)"/>
  <circle cx="152" cy="192" r="15" fill="none" stroke="#a78bfa" stroke-width="1.6"/>
  <circle cx="152" cy="192" r="5" fill="#a78bfa"/>
  <text x="152" y="238" text-anchor="middle" fill="#c4b5fd" font-size="17" font-weight="700">Course viewer</text>

  <!-- Quiz and game (green) -->
  <rect x="270" y="146" width="180" height="123" rx="12" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="270" y="146" width="180" height="123" rx="12" fill="none" stroke="#34d399" stroke-width="1.6" filter="url(#glow)"/>
  <circle cx="360" cy="192" r="15" fill="none" stroke="#34d399" stroke-width="1.6"/>
  <circle cx="360" cy="192" r="5" fill="#34d399"/>
  <text x="360" y="238" text-anchor="middle" fill="#6ee7b7" font-size="17" font-weight="700">Quiz and game</text>

  <!-- CTF terminal (amber) -->
  <rect x="478" y="146" width="180" height="123" rx="12" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="478" y="146" width="180" height="123" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.6" filter="url(#glow)"/>
  <circle cx="568" cy="192" r="15" fill="none" stroke="#fbbf24" stroke-width="1.6"/>
  <path d="M562 187 l5 5 l-5 5 M571 197 h6" stroke="#fbbf24" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="568" y="238" text-anchor="middle" fill="#fcd34d" font-size="17" font-weight="700">CTF terminal</text>

  <!-- ============ BACKEND ZONE ============ -->
  <rect x="40" y="346" width="640" height="200" rx="12" fill="#0c1424" fill-opacity="0.35" stroke="#3a4c66" stroke-width="1.4" stroke-dasharray="7 5"/>
  <rect x="60" y="358" width="90" height="22" rx="11" fill="#16223a"/>
  <text x="105" y="373" text-anchor="middle" fill="#9db0c9" font-size="12" font-weight="700" letter-spacing="2">BACKEND</text>

  <!-- AI chatbox (cyan) -->
  <rect x="100" y="404" width="230" height="98" rx="12" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="100" y="404" width="230" height="98" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="116" y="428" width="5" height="50" rx="2.5" fill="#22d3ee"/>
  <text x="225" y="459" text-anchor="middle" fill="#67e8f9" font-size="18" font-weight="700">AI chatbox</text>

  <!-- Flag verifier (rose) -->
  <rect x="390" y="404" width="230" height="98" rx="12" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="390" y="404" width="230" height="98" rx="12" fill="none" stroke="#fb7185" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="406" y="428" width="5" height="50" rx="2.5" fill="#fb7185"/>
  <text x="515" y="459" text-anchor="middle" fill="#fda4af" font-size="18" font-weight="700">Flag verifier</text>

  <!-- ============ CONNECTIONS ============ -->
  <!-- AI chatbox -> Course viewer -->
  <path d="M215 404 L215 324 L152 324 L152 269" fill="none" stroke="#22d3ee" stroke-width="1.6" opacity="0.85" marker-end="url(#arrowCyan)"/>
  <circle cx="215" cy="324" r="3" fill="#22d3ee"/>

  <!-- CTF terminal -> Flag verifier -->
  <path d="M568 269 L568 324 L515 324 L515 404" fill="none" stroke="#fbbf24" stroke-width="1.6" opacity="0.85" marker-end="url(#arrowAmber)"/>
  <circle cx="568" cy="324" r="3" fill="#fbbf24"/>
</svg>

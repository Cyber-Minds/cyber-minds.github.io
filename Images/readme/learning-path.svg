<svg width="920" height="260" viewBox="0 0 920 260" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'Trebuchet MS', sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap');
    </style>

    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="55%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>

    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17223c"/>
      <stop offset="100%" stop-color="#0b1122"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1b2942" stroke-width="0.5"/>
    </pattern>

    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8" fill="none" stroke="#7c8db5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="920" height="260" fill="url(#bg)"/>
  <rect width="920" height="260" fill="url(#grid)" opacity="0.35"/>

  <!-- ============ CARD 1: LEARN (violet) ============ -->
  <rect x="45" y="40" width="170" height="180" rx="16" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="45" y="40" width="170" height="180" rx="16" fill="none" stroke="#a78bfa" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="104" y="64" width="52" height="52" rx="15" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-width="1.3"/>
  <g transform="translate(130,90)" stroke="#c4b5fd" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 -9 C -4 -12 -10 -12 -13 -10 L -13 9 C -10 7 -4 7 0 10"/>
    <path d="M0 -9 C 4 -12 10 -12 13 -10 L 13 9 C 10 7 4 7 0 10"/>
    <line x1="0" y1="-9" x2="0" y2="10"/>
  </g>
  <text x="130" y="152" text-anchor="middle" fill="#e6ecf5" font-size="17" font-weight="700">Learn</text>
  <text x="130" y="176" text-anchor="middle" fill="#8497b0" font-size="11.5">Short courses</text>
  <text x="130" y="191" text-anchor="middle" fill="#8497b0" font-size="11.5">and quizzes</text>

  <!-- ============ CARD 2: PRACTICE (cyan) ============ -->
  <rect x="265" y="40" width="170" height="180" rx="16" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="265" y="40" width="170" height="180" rx="16" fill="none" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="324" y="64" width="52" height="52" rx="15" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-width="1.3"/>
  <g transform="translate(350,90)" stroke="#67e8f9" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-14" y="-11" width="28" height="22" rx="4"/>
    <path d="M-7 -3 l4 3 l-4 3"/>
    <line x1="1" y1="4" x2="8" y2="4"/>
  </g>
  <text x="350" y="152" text-anchor="middle" fill="#e6ecf5" font-size="17" font-weight="700">Practice</text>
  <text x="350" y="176" text-anchor="middle" fill="#8497b0" font-size="11.5">Real terminal</text>
  <text x="350" y="191" text-anchor="middle" fill="#8497b0" font-size="11.5">in the browser</text>

  <!-- ============ CARD 3: COMPETE (amber) ============ -->
  <rect x="485" y="40" width="170" height="180" rx="16" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="485" y="40" width="170" height="180" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="544" y="64" width="52" height="52" rx="15" fill="#fbbf24" fill-opacity="0.14" stroke="#fbbf24" stroke-width="1.3"/>
  <g transform="translate(570,90)" stroke-linecap="round" stroke-linejoin="round">
    <line x1="-9" y1="-12" x2="-9" y2="13" stroke="#fcd34d" stroke-width="2"/>
    <path d="M-9 -11 L9 -11 L4 -5 L9 1 L-9 1 Z" fill="#fcd34d" stroke="#fcd34d" stroke-width="1.5"/>
  </g>
  <text x="570" y="152" text-anchor="middle" fill="#e6ecf5" font-size="17" font-weight="700">Compete</text>
  <text x="570" y="176" text-anchor="middle" fill="#8497b0" font-size="11.5">Guided CTF</text>
  <text x="570" y="191" text-anchor="middle" fill="#8497b0" font-size="11.5">challenges</text>

  <!-- ============ CARD 4: GET HELP (green) ============ -->
  <rect x="705" y="40" width="170" height="180" rx="16" fill="url(#card)" filter="url(#softshadow)"/>
  <rect x="705" y="40" width="170" height="180" rx="16" fill="none" stroke="#34d399" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="764" y="64" width="52" height="52" rx="15" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-width="1.3"/>
  <g transform="translate(790,90)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-13 -9 L11 -9 Q14 -9 14 -6 L14 5 Q14 8 11 8 L-3 8 L-9 13 L-9 8 L-10 8 Q-13 8 -13 5 L-13 -6 Q-13 -9 -10 -9 Z"/>
  </g>
  <text x="790" y="152" text-anchor="middle" fill="#e6ecf5" font-size="17" font-weight="700">Get Help</text>
  <text x="790" y="176" text-anchor="middle" fill="#8497b0" font-size="11.5">AI chatbot,</text>
  <text x="790" y="191" text-anchor="middle" fill="#8497b0" font-size="11.5">anytime</text>

  <!-- ============ ARROWS ============ -->
  <line x1="226" y1="118" x2="252" y2="118" stroke="#7c8db5" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="446" y1="118" x2="472" y2="118" stroke="#7c8db5" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="666" y1="118" x2="692" y2="118" stroke="#7c8db5" stroke-width="1.6" marker-end="url(#arrow)"/>
</svg>

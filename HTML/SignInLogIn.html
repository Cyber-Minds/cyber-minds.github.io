<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - CyberMinds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="../CSS/SignInLogIn.css">
</head>
<body>
    <div class="auth-container" data-aos="fade-right" data-aos-delay="100">
        <!-- Left Side - Background Image -->
        <div class="auth-image">
            <div class="back-to-home">
                <a href="../index.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Home
                </a>
            </div>
            <div class="image-content">
                <h1 data-aos="fade-right" data-aos-delay="200">Welcome to CyberMinds</h1>
                <p data-aos="fade-right" data-aos-delay="300">Signing in is completely optional but preferred to save your course progress!</p>
            </div>
        </div>
        
        <!-- Right Side - Form -->
        <div class="auth-form">
                <div class="form-container" data-aos="fade-left" data-aos-delay="400">
                    <div class="form-header">
                        <h2>Get Started</h2>
                        <p>Sign in to your account or create a new one</p>
                    </div>
                
                <div class="form-tabs" data-aos="fade-up" data-aos-delay="500">
                    <button class="tab-button active" onclick="switchTab('login')">Sign In</button>
                    <button class="tab-button" onclick="switchTab('signup')">Sign Up</button>
                </div>
                
                <!-- Login Form -->
                <div id="login-form" class="form-content active" data-aos="fade-up" data-aos-delay="600">
                    <form>
                        <div class="form-group">
                            <label class="form-label" for="login-email">Email Address</label>
                            <input type="email" class="form-control" id="login-email" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="login-password">Password</label>
                            <input type="password" class="form-control" id="login-password" placeholder="Enter your password" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">Sign In</button>
                        
                    </form>
                </div>
                
                <!-- Sign Up Form -->
                <div id="signup-form" class="form-content" data-aos="fade-up" data-aos-delay="600">
                    <form>
                        <div class="form-group">
                            <label class="form-label" for="signup-name">Full Name</label>
                            <input type="text" class="form-control" id="signup-name" placeholder="Enter your full name" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="signup-email">Email Address</label>
                            <input type="email" class="form-control" id="signup-email" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="signup-password">Password</label>
                            <input type="password" class="form-control" id="signup-password" placeholder="Create a password" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
    function switchTab(tab) {
        // Remove active class from all tabs and forms
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
        
        // Add active class to selected tab and form
        const targetButton = document.querySelector(`[onclick="switchTab('${tab}')"]`);
        if (targetButton) {
            targetButton.classList.add('active');
        }
        document.getElementById(tab + '-form').classList.add('active');
        
        // Refresh AOS animations for the newly active form
        setTimeout(() => {
            AOS.refresh();
        }, 100);
    }

    // Check URL parameters on page load
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize AOS (Animate On Scroll)
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true,
            offset: 100
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        
        if (tab === 'signup') {
            switchTab('signup');
        } else {
            switchTab('login');
        }
    });
    
    // Form submission handlers - prevent page reload
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('This is a demo - no authentication is performed');
    });
    
    document.getElementById('signup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('This is a demo - no authentication is performed');
    });
</script>
</body>
</html>
